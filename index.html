const quizContainer = document.getElementById("quiz");

function load() {
    quizContainer.innerHTML = "";
    questions.forEach((item, i) => {
        let div = document.createElement("div");
        div.className = "question";
        let html = `<p><b>${item.q}</b></p>`;
        item.a.forEach((ans, index) => {
            html += `
                <label>
                    <input type="radio" name="q${i}" value="${index}">
                    ${String.fromCharCode(65 + index)}. ${ans}
                </label><br>
            `;
        });
        div.innerHTML = html;
        quizContainer.appendChild(div);
    });
}

function check() {
    let score = 0;
    questions.forEach((q, i) => {
        let options = document.getElementsByName("q" + i);
        let answered = false;

        options.forEach(opt => {
            let label = opt.parentElement;
            label.classList.remove("correct", "wrong");

            // Nếu là đáp án đúng, tô xanh
            if (parseInt(opt.value) === q.correct) {
                label.classList.add("correct");
            }

            if (opt.checked) {
                answered = true;
                if (parseInt(opt.value) === q.correct) {
                    score++;
                } else {
                    // Nếu chọn sai, tô đỏ đáp án đã chọn
                    label.classList.add("wrong");
                }
            }
        });
    });

    document.getElementById("result").innerHTML = 
        "Kết quả: <b>" + score + " / " + questions.length + "</b> câu đúng.";
    window.scrollTo(0, 0); // Cuộn lên đầu để xem điểm
}

function shuffleQuestions() {
    for (let i = questions.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    load();
}

// Khởi tạo lần đầu
load();
</script>
