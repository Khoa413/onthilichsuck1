const quiz=document.getElementById("quiz");

function load(){

quiz.innerHTML="";

questions.forEach((item,i)=>{

let div=document.createElement("div");
div.className="question";

let html=`<p><b>${item.q}</b></p>`;

item.a.forEach((ans,index)=>{

html+=`
<label>
<input type="radio" name="q${i}" value="${index}">
${String.fromCharCode(65+index)}. ${ans}
</label><br>
`;

});

div.innerHTML=html;

quiz.appendChild(div);

});

}

load();

function check(){

let score=0;

questions.forEach((q,i)=>{

let options=document.getElementsByName("q"+i);

options.forEach(opt=>{

let label=opt.parentElement;

label.classList.remove("correct","wrong");

if(opt.checked){

if(parseInt(opt.value)===q.correct){

label.classList.add("correct");
score++;

}else{

label.classList.add("wrong");

}

}

if(parseInt(opt.value)===q.correct){

label.classList.add("correct");

}

});

});

document.getElementById("result").innerHTML=
"Bạn đúng <b>"+score+" / "+questions.length+"</b> câu";

}

function shuffleQuestions(){

for(let i=questions.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));
[questions[i],questions[j]]=[questions[j],questions[i]];

}

load();

}
